definitions:
  name: 'Sintering Schema'
  sections:
    Sintering:
      base_sections:
        - nomad.datamodel.metainfo.eln.Process
        - nomad.datamodel.data.EntryData
      description: |
        Schema for the Sintering Process.
        Note: Automatic parsing is currently disabled due to unstructured Excel format.
      
      quantities:
        # 1. Link to the Sol-Gel Sample (HeOx-1)
        input_sample:
          type: nomad.datamodel.metainfo.eln.Sample
          description: Link to the material used.
          m_annotations:
            eln:
              component: ReferenceEditQuantity
              label: Input Material Sample

        # 2. File Upload
        data_file:
          type: str
          description: Upload the parameter file here.
          m_annotations:
            eln:
              component: FileEditQuantity

        # 3. Manual Data Entry (Since we can't parse yet)
        temperature:
          type: np.float64
          unit: degC
          description: Max temperature (manually extracted).
          m_annotations:
            eln:
              component: NumberEditQuantity
        
        duration:
          type: np.float64
          unit: minute
          description: Dwell time (manually extracted).
          m_annotations:
            eln:
              component: NumberEditQuantity