site_name: Tutorial NOMAD User Basics
site_description: |
  Glaide Data Management Tutorial for NOMAD Users
site_author: Galide Data GmbH
repo_url: https://github.com/glaidedata/glaide-tutorial-user-basic
edit_uri: ""

nav:
  - Home: index.md
  - Tutorials:
    - 1. Experiment & Substance: 01_experiment_substance.md
    - 2. Sol-Gel Synthesis: 02_sol_gel_synthesis.md
    - 3. Sintering Process: 03_sintering_process.md
    - 4. Instrument Inventory: 04_inventory.md
    - 5. XRD & SEM Characterization: 05_characterization.md
    - 6. Finding Your Data: 06_finding_data.md

plugins:
 - search

theme:
  name: material
  custom_dir: docs/theme
  palette:
    primary: '#2A4CDF'
    accent: '#008A67'
  font:
    text: 'Titillium Web'
  logo: assets/glaide_logo_long_white.png
  favicon: assets/favicon.png
  features:
    - navigation.instant
    - navigation.footer
    - content.code.copy
    - content.buttons
  prev_next_buttons_location: both

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: True
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
  - mkdocs-click
  - pymdownx.extra

extra:
  generator: false
  homepage: https://www.glaidedata.com/
  icon:
    repo: fontawesome/brands/github
  footer: |
    © FAIRmat-NFDI (Apache 2.0) — Modified by Glaide Data GmbH.
    Licensed content; redistribution prohibited without permission.

use_directory_urls: false

extra_css:
  - stylesheets/extra.css
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/contrib/auto-render.min.js
