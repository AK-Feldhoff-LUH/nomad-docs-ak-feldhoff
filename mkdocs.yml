site_name: Tutorial NOMAD User Basics
site_description: |
  Glaide Data Management Tutorial for NOMAD Users
site_author: Galide Data GmbH
repo_url: https://github.com/glaidedata/glaide-tutorial-user-basic
edit_uri: ""

nav:
  - Home: index.md
  - Tutorials:
    - 1. Experiment & Substance: 01_experiment_substance.md
    - 2. Sol-Gel Synthesis: 02_sol_gel_synthesis.md
    - 3. Sintering Process: 03_sintering_process.md
    - 4. Instrument Inventory: 04_inventory.md
    - 5. XRD & SEM Characterization: 05_characterization.md
    - 6. Finding Your Data: 06_finding_data.md
  # - Overview: index.md
  # - Contents:
  # - Search and Filter: T16_1/T16_1_search_and_filter.md
  #- Explore NOMAD entries: T16_2/T16_2_explore_data_records.md
  #- Document Your Research: T16_6/T16_6_document_your_research.md
  #- Upload Raw Data Files: T16_3/T16_3_upload_raw_data_files.md
#      - Visualize Your Data: T16_4/T16_4_visualize_your_data.md
  #- Create a Dataset: T16_5/T16_5_create_a_dataset.md
  # - Advanced Topics:
  #     - Create Custom ELN Templates: T16_7/T16_7_create_custom_eln_templates.md
  #     - Use Tabular Parser: T16_8/T16_8_write_a_custom_parser.md

plugins:
 - search
theme:
  name: material
  palette:
    primary: '#2A4CDF'
    accent: '#008A67'
  font:
    text: 'Titillium Web'
  logo: assets/glaide_logo_long_white.png
  favicon: assets/favicon.png
  features:
    - navigation.instant
    - navigation.footer
    - content.code.copy
  custom_dir: docs/theme
markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - toc:
      permalink: True
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - mkdocs-click
  - pymdownx.extra
extra:
  generator: false
  homepage: https://www.glaidedata.com/
  icon:
    repo: fontawesome/brands/github
  footer: |
    © FAIRmat-NFDI (Apache 2.0) — Modified by Glaide Data GmbH.
    Licensed content; redistribution prohibited without permission.
use_directory_urls: false
extra_css:
  - stylesheets/extra.css
extra_javascript:
#  - javascript.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
