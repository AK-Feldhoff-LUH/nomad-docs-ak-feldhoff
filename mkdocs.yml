site_name: Documentation
site_description: |
  Glaide Data Management Tutorial for NOMAD Users
site_author: Galide Data GmbH
repo_url: https://github.com/glaidedata/glaide-tutorial-user-basic
edit_uri: ""

nav:
  - Home: index.md
  - Tutorial: 
    - Overview: tutorial.md
    - I. Creating an Instrument Inventory: instrument_inventory.md
    - II. Documenting an Experiment:
      - a. Experiment Setup: experiment_setup.md
      - b. Sol-Gel Synthesis: sol_gel_synthesis.md
      - c. Sample Entry: sample_entry.md
      - d. Sintering Process: sintering_process.md
      - e. XRD Characterization: xrd_characterization.md
      - f. SEM Characterization: sem_characterization.md
    - III. Finding Previous Experiments: finding_previous_experiments.md
  - Maintenance Guide: how_to.md

plugins:
 - search

theme:
  name: material
  custom_dir: docs/theme
  palette:
    primary: '#2A4CDF'
    accent: '#008A67'
  font:
    text: 'Titillium Web'
  logo: assets/nomad-logo.png
  favicon: assets/favicon.png
  features:
    - navigation.instant
    - navigation.footer
    - content.code.copy
    - content.buttons
  prev_next_buttons_location: both

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: True
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
  - mkdocs-click
  - pymdownx.extra

extra:
  generator: false
  homepage: https://nomad.pci.uni-hannover.de/nomad-oasis/gui/about/information
  icon:
    repo: fontawesome/brands/github
  footer: |
    Initial documentation by Glaide Data GmbH · Apache 2.0 License.

use_directory_urls: false

extra_css:
  - stylesheets/extra.css
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/contrib/auto-render.min.js
