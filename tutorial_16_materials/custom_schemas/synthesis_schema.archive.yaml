definitions:
  name: 'Sol-gel Synthesis Schema'
  sections:
    SolGelPowder:
      base_sections:
        - nomad.datamodel.metainfo.eln.Sample
        - nomad.datamodel.data.EntryData
      description: |
        Schema for the sol-gel synthesis of powder samples like HeOx-1.
      quantities:
        lab_id:
          type: str
          description: 'The Sample ID (e.g., HeOx-1).'
          m_annotations:
            eln:
              component: StringEditQuantity
              label: Sample ID
        
        water_volume:
          type: np.float64
          unit: ml
          description: 'Volume of water used in the initial heating step.'
          m_annotations:
            eln:
              component: NumberEditQuantity
              
        calcination_temperature:
          type: np.float64
          unit: degC
          description: 'Temperature used during the final calcination step.'
          m_annotations:
            eln:
              component: NumberEditQuantity
              
        calcination_time:
          type: np.float64
          unit: hour
          description: 'Duration of the final calcination step.'
          m_annotations:
            eln:
              component: NumberEditQuantity