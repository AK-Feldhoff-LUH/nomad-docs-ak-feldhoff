definitions:
  name: 'Sol-gel Synthesis Schema'
  sections:
    SolGelPowder:
      base_sections:
        - nomad.datamodel.metainfo.eln.Sample
        - nomad.datamodel.data.EntryData
      description: |
        Schema for the sol-gel synthesis of powder samples like HeOx-1.
      quantities:
        lab_id:
          type: str
          [cite_start]description: 'The Sample ID (e.g., HeOx-1).'
          m_annotations:
            eln:
              component: StringEditQuantity
              label: Sample ID
        precursors:
          type: str
          shape: ['*']
          [cite_start]description: 'List of chemical precursors used (e.g., Nitrates, Oxides)[cite: 13].'
          m_annotations:
            eln:
              component: TagEditQuantity
        total_mass:
          type: np.float64
          unit: g
          [cite_start]description: 'The measured mass of the synthesized powder.'
          m_annotations:
            eln:
              component: NumberEditQuantity